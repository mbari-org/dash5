name: Build and Release Static Site

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    tags:
      - 'v*'  # Run when a version tag is pushed
  release:
    types: [created]

env:
  NEXT_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_API_HOST || 'https://okeanids.mbari.org/' }}
  NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL || 'https://okeanids.mbari.org//TethysDash/api' }}
  NEXT_PUBLIC_ODSS2BASE_URL: ${{ vars.NEXT_PUBLIC_ODSS2BASE_URL || 'http://okeanids.mbari.org//odss2dash/api' }}
  NEXT_PUBLIC_WEBSOCKET_URL: ${{ vars.NEXT_PUBLIC_WEBSOCKET_URL || 'wss://okeanids.mbari.org/ws/' }}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'placeholder-api-key' }}
  NEXT_PUBLIC_REACT_APP_ESRI_API_KEY: ${{ secrets.REACT_APP_ESRI_API_KEY || 'placeholder-api-key' }}

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.env_name }}
      is_production: ${{ steps.set-env.outputs.is_production }}
      version: ${{ steps.set-env.outputs.version }}
    steps:
      - name: Checkout code to inspect tag metadata
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Need full history to determine branch for tag
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Determine environment based on tag annotation
        id: set-env
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG_NAME" ]]; then
            echo "Manual workflow dispatch - defaulting to STAGING"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
            echo "version=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_SUBJECT=$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(subject)')
          VERSION="${TAG_NAME#v}"

          echo "Tag ${TAG_NAME} subject: ${TAG_SUBJECT}"

          if [[ "$TAG_SUBJECT" == Production\ release* ]]; then
            echo "Annotated as PRODUCTION"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_SUBJECT" == Staging\ release* ]]; then
            echo "Annotated as STAGING"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          else
            COMMIT_SHA=$(git rev-list -n 1 "$TAG_NAME")

            if git branch -r --contains "$COMMIT_SHA" | grep -q 'origin/main$'; then
              echo "Falling back to branch detection: PRODUCTION"
              echo "env_name=production" >> "$GITHUB_OUTPUT"
              echo "is_production=true" >> "$GITHUB_OUTPUT"
            elif git branch -r --contains "$COMMIT_SHA" | grep -q 'origin/develop$'; then
              echo "Falling back to branch detection: STAGING"
              echo "env_name=staging" >> "$GITHUB_OUTPUT"
              echo "is_production=false" >> "$GITHUB_OUTPUT"
            else
              echo "Unable to infer branch. Defaulting to STAGING."
              echo "env_name=staging" >> "$GITHUB_OUTPUT"
              echo "is_production=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build-static:
    runs-on: ubuntu-latest
    needs: determine-environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build static site
        run: |
          echo "Building with environment variables:"
          echo "NEXT_PUBLIC_API_HOST: $NEXT_PUBLIC_API_HOST"
          echo "NEXT_PUBLIC_BASE_URL: $NEXT_PUBLIC_BASE_URL"
          echo "NEXT_PUBLIC_ODSS2BASE_URL: $NEXT_PUBLIC_ODSS2BASE_URL"
          echo "NEXT_PUBLIC_WEBSOCKET_URL: $NEXT_PUBLIC_WEBSOCKET_URL"
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: [REDACTED]"
          echo "Building for environment: ${{ needs.determine-environment.outputs.env_name }}"
          
          # Configure basePath, assetPrefix can remain as-is now that we deploy to a subdomain.
          # sed -i 's/\/\/ basePath: '\''\/dash5'\''/basePath: '\''\/staging\/dash5'\''/' apps/lrauv-dash2/next.config.js
          # sed -i 's/\/\/ assetPrefix: '\''\.'\''/assetPrefix: '\''\/staging\/dash5'\''/' apps/lrauv-dash2/next.config.js

          # Configure output to be statically exported
          sed -i 's/\/\/ output: '\''export'\''/output: '\''export'\''/' apps/lrauv-dash2/next.config.js
          
          yarn build
      
      - name: Pack output directory
        run: |
          cd apps/lrauv-dash2
          tar -czvf ../../lrauv-dash-static.tar.gz out/
          cd ../..
      
      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: static-build
          path: lrauv-dash-static.tar.gz
          
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: lrauv-dash-static.tar.gz
          
  build-docker:
    runs-on: ubuntu-latest
    needs: [determine-environment, build-static]
    if: success() && (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
        
      - name: Download static build
        uses: actions/download-artifact@v4
        with:
          name: static-build
          
      - name: Extract static files
        run: |
          mkdir -p apps/lrauv-dash2
          tar -xzvf lrauv-dash-static.tar.gz -C apps/lrauv-dash2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Prepare Docker tags
        id: docker-tags
        run: |
          CHANNEL="${{ needs.determine-environment.outputs.env_name }}"
          VERSION="${{ needs.determine-environment.outputs.version }}"

          {
            echo "tags<<EOF"
            echo "mbari/lrauv-dash-5:${CHANNEL}"
            echo "ghcr.io/${{ github.repository_owner }}/lrauv-dash-5:${CHANNEL}"

            if [[ "$CHANNEL" == "staging" ]]; then
              echo "mbari/lrauv-dash-5:${CHANNEL}-${VERSION}"
              echo "ghcr.io/${{ github.repository_owner }}/lrauv-dash-5:${CHANNEL}-${VERSION}"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      
      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          build-args: |
            ENVIRONMENT=${{ needs.determine-environment.outputs.env_name }}
      
      - name: Skip Watchtower for production
        if: needs.determine-environment.outputs.is_production == 'true'
        run: |
          echo "Production image published. Watchtower auto-update is intentionally disabled."

      - name: Trigger Watchtower to update staging container
        if: needs.determine-environment.outputs.is_production == 'false'
        shell: bash
        run: |
          if [ -n "${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}" ] && [ -n "${{ secrets.TETHYSDASH2_WATCHTOWER_ENDPOINT }}" ]; then
            curl -H "Authorization: Bearer ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}" ${{ secrets.TETHYSDASH2_WATCHTOWER_ENDPOINT }}
            echo "Watchtower update triggered successfully for STAGING"
          else
            echo "Skipping Watchtower update - required secrets not configured"
          fi
          
      # Send Slack notification
      - name: Send Slack notification
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          message: "Static site deployment for LRAUV Dashboard ${{ github.ref_name }} completed for ${{ needs.determine-environment.outputs.env_name }} environment"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always() # Pick up events even if the job fails or is canceled
