name: Build and Release Static Site

on:
  workflow_dispatch:  # Allow manual triggering
  push:
    tags:
      - 'v*'  # Run when a version tag is pushed
  release:
    types: [created]

env:
  NEXT_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_API_HOST || 'https://okeanids.mbari.org/' }}
  NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL || 'https://okeanids.mbari.org//TethysDash/api' }}
  NEXT_PUBLIC_ODSS2BASE_URL: ${{ vars.NEXT_PUBLIC_ODSS2BASE_URL || 'http://okeanids.mbari.org//odss2dash/api' }}
  NEXT_PUBLIC_WEBSOCKET_URL: ${{ vars.NEXT_PUBLIC_WEBSOCKET_URL || 'wss://okeanids.mbari.org/ws/' }}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY || 'placeholder-api-key' }}

jobs:
  build-static:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build static site
        run: |
          echo "Building with environment variables:"
          echo "NEXT_PUBLIC_API_HOST: $NEXT_PUBLIC_API_HOST"
          echo "NEXT_PUBLIC_BASE_URL: $NEXT_PUBLIC_BASE_URL"
          echo "NEXT_PUBLIC_ODSS2BASE_URL: $NEXT_PUBLIC_ODSS2BASE_URL"
          echo "NEXT_PUBLIC_WEBSOCKET_URL: $NEXT_PUBLIC_WEBSOCKET_URL"
          echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: [REDACTED]"
          
          yarn build
      
      - name: Pack output directory
        run: |
          cd apps/lrauv-dash2
          tar -czvf ../../lrauv-dash-static.tar.gz out/
          cd ../..
      
      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: static-build
          path: lrauv-dash-static.tar.gz
          
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: lrauv-dash-static.tar.gz
          
  build-docker:
    runs-on: ubuntu-latest
    needs: build-static
    if: success() && (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Download static build
        uses: actions/download-artifact@v4
        with:
          name: static-build
          
      - name: Extract static files
        run: |
          mkdir -p apps/lrauv-dash2
          tar -xzvf lrauv-dash-static.tar.gz -C apps/lrauv-dash2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # Extract metadata for Docker tags
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            mbari/lrauv-dash-5
            ghcr.io/${{ github.repository_owner }}/lrauv-dash-5
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      # Trigger Watchtower to update container
      - name: Trigger Watchtower to update container
        shell: bash
        run: |
          if [ -n "${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}" ] && [ -n "${{ secrets.TETHYSDASH_STATIC_WATCHTOWER_ENDPOINT }}" ]; then
            curl -H "Authorization: Bearer ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}" ${{ secrets.TETHYSDASH_STATIC_WATCHTOWER_ENDPOINT }}
            echo "Watchtower update triggered successfully"
          else
            echo "Skipping Watchtower update - required secrets not configured"
          fi
          
      # Send Slack notification
      - name: Send Slack notification
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          message: "Static site deployment for LRAUV Dashboard ${{ github.ref_name }} completed"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always() # Pick up events even if the job fails or is canceled