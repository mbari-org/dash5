name: Build and Test

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Build
        run: yarn build
        
      - name: Lint
        run: yarn lint
        
      - name: Run React UI Tests
        run: yarn workspace @mbari/react-ui test
        
      - name: Run API Client Tests
        run: yarn workspace @mbari/api-client test
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Run LRAUV Dashboard Tests (in CI mode)
        run: yarn workspace @mbari/lrauv-dash2 test:ci