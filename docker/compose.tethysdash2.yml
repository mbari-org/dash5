# For tethysdash2 deployment. Copy to ~/lrauv-dash-5/compose.yml on the server.
# Staging: dash5-staging.mbari.org → port 4050
# Production: dash5.mbari.org → port 4051
#
# Usage on tethysdash2:
#   cd ~/lrauv-dash-5
#   docker compose -f compose.yml up -d
#
services:
  dash5-staging:
    image: index.docker.io/mbari/lrauv-dash-5:5
    ports:
      - "4050:80"
    init: true
    container_name: dash5-staging
    restart: always
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'

  dash5-production:
    image: index.docker.io/mbari/lrauv-dash-5:5  # or :latest, :production when releases are tagged from main
    ports:
      - "4051:80"
    init: true
    container_name: dash5-production
    restart: always
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
