# Virtual host configuration for Apache to proxy to Next.js app
<VirtualHost *:80>
    ServerName localhost
    ServerAlias dash5-staging.local

    # Enable rewrite engine
    RewriteEngine On

    # Logging
    LogLevel debug
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # Preserve Host header to make sure nginx processes the right server block
    ProxyPreserveHost On

    # Set headers that will be passed to the proxied server
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    RequestHeader set X-Forwarded-Host "dash5-staging.mbari.org"
    
    # Main site configuration - proxying at root level
    ProxyPass        /  http://dash5-app:80/
    ProxyPassReverse /  http://dash5-app:80/

    # Handle WebSocket connections if needed
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://dash5-app:80/$1 [P,L]
</VirtualHost>

# Subdomain configuration
<VirtualHost *:80>
    ServerName subdomain.dash5-staging.local
    
    # Enable rewrite engine
    RewriteEngine On
    
    # Logging
    LogLevel debug
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    
    # Preserve Host header to make sure nginx processes the right server block
    ProxyPreserveHost On
    
    # Set headers that will be passed to the proxied server
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    RequestHeader set X-Forwarded-Host "dash5.mbari.org"
    
    # Proxy settings - simulating subdomain
    ProxyPass        /  http://dash5-app:80/
    ProxyPassReverse /  http://dash5-app:80/
    
    # Handle WebSocket connections if needed
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://dash5-app:80/$1 [P,L]
</VirtualHost>