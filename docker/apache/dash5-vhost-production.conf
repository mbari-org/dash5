# Apache virtual host config for tethysdash2 (host-side)
# Proxies dash5.mbari.org and dash5-staging.mbari.org to the dash5 container on port 4050
#
# Installation:
#   1. Copy to /etc/apache2/sites-available/dash5.conf
#   2. Replace SSL_CERT_PATH with actual cert paths (e.g. /etc/letsencrypt/live/dash5.mbari.org/)
#   3. sudo a2enmod proxy proxy_http rewrite headers ssl
#   4. sudo a2ensite dash5
#   5. sudo systemctl reload apache2

# Production
<VirtualHost *:443>
    ServerName dash5.mbari.org
    SSLEngine on
    SSLCertificateFile /path/to/fullchain.pem
    SSLCertificateKeyFile /path/to/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "dash5.mbari.org"

    ProxyPass        /  http://localhost:4050/
    ProxyPassReverse /  http://localhost:4050/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://localhost:4050/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/dash5-error.log
    CustomLog ${APACHE_LOG_DIR}/dash5-access.log combined
</VirtualHost>

# Staging
<VirtualHost *:443>
    ServerName dash5-staging.mbari.org
    SSLEngine on
    SSLCertificateFile /path/to/fullchain.pem
    SSLCertificateKeyFile /path/to/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "dash5-staging.mbari.org"

    ProxyPass        /  http://localhost:4050/
    ProxyPassReverse /  http://localhost:4050/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://localhost:4050/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/dash5-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/dash5-staging-access.log combined
</VirtualHost>
