# Apache virtual host config for dash5.shore.mbari.org on tethysdash2
# Proxies to the dash5 container on port 4050
#
# Installation on tethysdash2 (run as salamy with sudo):
#   1. SCP this file to server, then: sudo cp /tmp/dash5-shore-vhost.conf /etc/apache2/sites-available/020-dash5-shore.conf
#   2. sudo a2enmod proxy proxy_http rewrite headers ssl
#   3. sudo a2ensite 020-dash5-shore
#   4. sudo apache2ctl configtest && sudo systemctl reload apache2
# Uses snakeoil (self-signed) cert; browser will warn but works for internal use.

# HTTP redirect to HTTPS (optional; remove if not using HTTPS)
<VirtualHost *:80>
    ServerName dash5.shore.mbari.org
    Redirect permanent / https://dash5.shore.mbari.org/
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName dash5.shore.mbari.org
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile   /etc/ssl/private/ssl-cert-snakeoil.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "dash5.shore.mbari.org"

    ProxyPass        /  http://localhost:4050/
    ProxyPassReverse /  http://localhost:4050/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://localhost:4050/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/dash5-shore-error.log
    CustomLog ${APACHE_LOG_DIR}/dash5-shore-access.log combined
</VirtualHost>
