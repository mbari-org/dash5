# Next.js static export server configuration
# This configuration is specifically designed to handle Next.js dynamic routes
server {
    listen 80;
    server_name localhost;
    
    # Root directory for the site
    root /usr/share/nginx/html;
    
    # Default index file
    index index.html;
    
    # No caching for development
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";

    # Handle static assets
    location /_next/static/ {
        alias /usr/share/nginx/html/_next/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle static files
    location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    
    # Handle JavaScript and CSS files
    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Important: Special handling for vehicle routes
    # This is the key to making Next.js dynamic routes work with static export
    location ~* ^/vehicle/ {
        # For debugging
        add_header X-Original-URI $request_uri;
        add_header X-Served-By "vehicle-dynamic-handler";
        
        # Always serve the dynamic route HTML for any vehicle path
        try_files /vehicle/[...deployment].html /index.html;
    }
    
    # Handle the base vehicle route
    location = /vehicle {
        add_header X-Served-By "vehicle-base-handler";
        try_files $uri $uri.html /vehicle/[...deployment].html /index.html;
    }
    
    # General route handling
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
    
    # Handle 404 errors
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}